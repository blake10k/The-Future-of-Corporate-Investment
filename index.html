<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Terminology Simulator - Vercel Ready</title>
    <!-- We load Tailwind CSS directly from a CDN so it works without a build step -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #e2e8f0; font-family: sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden selection:bg-red-500/30">

    <!-- Top Navigation -->
    <div class="h-16 border-b border-gray-800 bg-gray-900/80 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-red-600 flex items-center justify-center text-white font-bold">AI</div>
            <h1 class="font-bold tracking-wide">Terminology Simulator</h1>
        </div>
        <div class="text-sm font-mono">
            <span class="text-gray-400">XP:</span> <span id="xp-display" class="text-red-400 font-bold">0</span>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="flex-1 overflow-y-auto p-6 md:p-12">
        <div class="max-w-3xl mx-auto">
            
            <div id="game-container" class="space-y-8 pb-32">
                <!-- JavaScript will inject questions here -->
            </div>

            <div id="completion-message" class="hidden text-center py-12 fade-in">
                <div class="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-white mb-4">Simulation Complete</h2>
                <p class="text-gray-400">You have successfully mastered the AI Terminology module.</p>
                <button onclick="location.reload()" class="mt-8 bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-xl font-bold transition-colors">Restart Simulation</button>
            </div>

        </div>
    </div>

    <script>
        // --- GAME DATA ---
        const questions = [
            {
                id: 1,
                instruction: "Select the correct definition for **Artificial Intelligence (AI)**.",
                options: [
                    "Algorithms that learn patterns from data.",
                    "Systems designed to perform tasks that normally require human intelligence.",
                    "A model inspired by the human brain’s interconnected neurons."
                ],
                correctIndex: 1
            },
            {
                id: 2,
                instruction: "Which term refers specifically to **ML using multi-layer neural networks**?",
                options: [
                    "Deep Learning",
                    "Machine Learning (ML)",
                    "Generative AI"
                ],
                correctIndex: 0
            },
            {
                id: 3,
                instruction: "What is the primary function of **Generative AI**?",
                options: [
                    "To find patterns without labels.",
                    "To classify data into distinct categories.",
                    "To create text, images, audio, code, or video."
                ],
                correctIndex: 2
            }
        ];

        // --- GAME STATE ---
        let currentStep = 0;
        let xp = 0;
        let attempts = {}; 
        const MAX_ATTEMPTS = 2;

        const container = document.getElementById('game-container');
        const xpDisplay = document.getElementById('xp-display');
        const completionMsg = document.getElementById('completion-message');

        // --- GAME LOGIC ---
        function renderStep(stepIndex) {
            if (stepIndex >= questions.length) {
                completionMsg.classList.remove('hidden');
                return;
            }

            const q = questions[stepIndex];
            attempts[q.id] = 0;

            // Create step HTML block
            const stepDiv = document.createElement('div');
            stepDiv.className = 'fade-in bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden';
            stepDiv.id = `step-${q.id}`;

            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <button id="btn-${q.id}-${idx}" onclick="handleGuess(${stepIndex}, ${idx})" class="w-full text-left p-4 bg-gray-800/50 hover:bg-gray-800 border border-transparent hover:border-gray-600 rounded-xl transition-all mb-3 text-sm flex items-center gap-4">
                        <span class="w-6 h-6 shrink-0 bg-gray-900 rounded flex items-center justify-center font-bold text-gray-500">${String.fromCharCode(65 + idx)}</span>
                        <span>${opt}</span>
                    </button>
                `;
            });

            // Format bold text
            const formattedInstruction = q.instruction.replace(/\*\*(.*?)\*\*/g, '<strong class="text-red-400 font-semibold">$1</strong>');

            stepDiv.innerHTML = `
                <div class="p-4 border-b border-gray-800 bg-gray-800/30 flex justify-between items-center">
                    <span class="text-xs font-mono text-gray-400">Terminal Output</span>
                    <span class="text-xs font-mono text-red-400">Step 0${stepIndex + 1}</span>
                </div>
                <div class="p-6">
                    <div class="mb-6 text-gray-200">${formattedInstruction}</div>
                    <div id="options-container-${q.id}">
                        ${optionsHtml}
                    </div>
                    <div id="feedback-${q.id}" class="hidden mt-4 px-4 py-3 rounded-lg text-sm font-medium"></div>
                </div>
            `;

            container.appendChild(stepDiv);
            
            // Auto scroll
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        // Must expose function to window for inline onclick to work
        window.handleGuess = function(stepIndex, selectedIdx) {
            const q = questions[stepIndex];
            const isCorrect = (selectedIdx === q.correctIndex);
            
            const btn = document.getElementById(`btn-${q.id}-${selectedIdx}`);
            const feedback = document.getElementById(`feedback-${q.id}`);
            const optionsContainer = document.getElementById(`options-container-${q.id}`);
            const allBtns = optionsContainer.querySelectorAll('button');

            if (isCorrect) {
                // Handle Success
                btn.className = "w-full text-left p-4 bg-red-500/20 border border-red-500 rounded-xl transition-all mb-3 text-sm flex items-center gap-4 text-red-400";
                
                feedback.className = "mt-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-900/30 border border-red-900/50 text-red-400 fade-in";
                feedback.innerHTML = "Correct! +50 XP";
                
                updateXP(50);
                disableButtons(allBtns);
                
                // Move to next step
                setTimeout(() => {
                    currentStep++;
                    renderStep(currentStep);
                }, 1200);

            } else {
                // Handle Failure
                attempts[q.id]++;
                btn.className = "w-full text-left p-4 bg-gray-800 border border-gray-700 rounded-xl transition-all mb-3 text-sm flex items-center gap-4 text-gray-500 opacity-50";
                btn.disabled = true;

                if (attempts[q.id] >= MAX_ATTEMPTS) {
                    // Auto-resolve
                    feedback.className = "mt-4 px-4 py-3 rounded-lg text-sm font-medium bg-gray-800 border border-gray-700 text-gray-300 fade-in";
                    feedback.innerHTML = "Max attempts reached. Moving on...";
                    
                    // Highlight correct answer
                    const correctBtn = document.getElementById(`btn-${q.id}-${q.correctIndex}`);
                    correctBtn.className = "w-full text-left p-4 bg-red-500/20 border border-red-500 rounded-xl transition-all mb-3 text-sm flex items-center gap-4 text-red-400";
                    
                    disableButtons(allBtns);
                    updateXP(10); // Partial XP

                    setTimeout(() => {
                        currentStep++;
                        renderStep(currentStep);
                    }, 2000);
                } else {
                    // Warning
                    feedback.className = "mt-4 px-4 py-3 rounded-lg text-sm font-medium bg-gray-800 border border-gray-700 text-gray-400 fade-in block";
                    feedback.innerHTML = `Incorrect. You have ${MAX_ATTEMPTS - attempts[q.id]} attempt(s) remaining.`;
                }
            }
        };

        function disableButtons(buttons) {
            buttons.forEach(b => {
                b.disabled = true;
                b.style.cursor = 'default';
            });
        }

        function updateXP(amount) {
            xp += amount;
            xpDisplay.innerText = xp;
            xpDisplay.classList.add('animate-pulse');
            setTimeout(() => xpDisplay.classList.remove('animate-pulse'), 500);
        }

        // Start Game
        renderStep(0);

    </script>
</body>
</html>
